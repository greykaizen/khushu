UpdateCheckMode: Tags

MaintainerNotes: |-
  Build the fdroid flavor, not the regular full flavor.

  The full flavor keeps Google downloadable fonts for the normal upstream
  distribution path. The fdroid flavor bundles fonts locally and avoids Google
  Play Services location.

  Use the Gradle property below so the fdroid build emits a single APK.

Builds:
  - versionName: "0.24.9"
    versionCode: 83
    commit: v0.24.9
    gradle:
      - fdroid
    gradleprops:
      - khushu.singleApk=true
